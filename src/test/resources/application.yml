
server:
  servlet:
    context-path: /api/v1

spring:
  h2:
    console:
      enabled: true
  task:
    scheduling:
      enabled: false
      thread-name-prefix: Product-Sync-
      product-sync-fixed-rate: 20000

feign:
  client:
    config:
      default:
           user-agent: curl/8.5.0
      providerA:
          url: https://fakestoreapi.com
      providerB:
          url: https://dummyjson.com


server:
  servlet:
    context-path: /api/v1

spring:
  datasource:
    url: jdbc:h2:mem:testdb;
  jpa:
    open-in-view: false    
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        jdbc:
          batch_size: 100
  h2:
    console:
      enabled: true
  task:
    scheduling:
      enabled: true
      thread-name-prefix: Product-Sync-
      #time in miliseconds
      product-sync-fixed-rate: 15000

feign:
  client:
    config:
      default:
           user-agent: curl/8.5.0
      providerA:
          url: https://fakestoreapi.com
      providerB:
          url: https://dummyjson.com

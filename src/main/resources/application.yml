
server:
  servlet:
    context-path: /api/v1

logging:
  file:
    name: inventory-merger.log

spring:
  datasource:
    url: jdbc:h2:file:./data/inventory-db;AUTO_SERVER=TRUE;
  jpa:
    open-in-view: false    
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        jdbc:
          batch_size: 100
  h2:
    console:
      enabled: true
  task:
    scheduling:
      enabled: true
      thread-name-prefix: Product-Sync-
      #time in miliseconds
      product-sync-fixed-rate: 600000

feign:
  client:
    config:
      default:
           user-agent: curl/8.5.0
      providerA:
          url: https://fakestoreapi.com
      providerB:
          url: https://dummyjson.com
